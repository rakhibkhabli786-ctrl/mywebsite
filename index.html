<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rakhib</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);transition:background 0.4s;}
nav.scrolled{background:rgba(5,5,5,0.95);backdrop-filter:blur(14px);}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{font-size:11px;color:rgba(255,255,255,0.6);text-decoration:none;letter-spacing:3px;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover{color:#fff;}

.hero{position:relative;height:35vh;min-height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hero-img{position:absolute;inset:0;background-image:url('IMG_20260602_170728.jpg');background-size:cover;background-position:center 15%;}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse 55% 90% at 5% 50%,rgba(15,40,160,0.65) 0%,transparent 55%),radial-gradient(ellipse 55% 90% at 95% 50%,rgba(180,60,0,0.5) 0%,transparent 55%),linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.0) 40%,rgba(0,0,0,0.8) 100%);}
.hero-text{position:relative;z-index:2;text-align:center;padding:0 20px;}
.hero-text h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,10vw,80px);letter-spacing:5px;line-height:1;opacity:0;animation:fadeUp 1.2s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;text-shadow:0 4px 30px rgba(0,0,0,0.5);}
.hero-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:8px;letter-spacing:4px;text-transform:uppercase;opacity:0;animation:fadeUp 1.2s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;}

.content{max-width:680px;margin:0 auto;padding:30px 16px 100px;}

.sec-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-bottom:8px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:20px;}

.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:12px;overflow:hidden;}
.pgrid-item{aspect-ratio:1;background:#161616;overflow:hidden;position:relative;cursor:pointer;}
.pgrid-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.pgrid-item:hover img{transform:scale(1.08);}

.loading{padding:60px 0;text-align:center;color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:4px;text-transform:uppercase;}

.how-to{background:#111;border-radius:12px;padding:20px;margin-top:20px;border:1px solid rgba(255,255,255,0.06);}
.how-to h3{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;}
.how-to p{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.7;}
.how-to code{background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:4px;font-size:12px;color:rgba(255,255,255,0.6);}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-links">
    <a href="#">Rakhib</a>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;">Gallery</div>
</nav>

<div class="hero">
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <h1>Rakhib</h1>
    <div class="hero-sub">Personal Gallery</div>
  </div>
</div>

<div class="content">
  <div class="sec-label">Gallery</div>
  <div class="sec-title">My Photos</div>

  <div id="loading" class="loading">Loading photos...</div>
  <div class="pgrid" id="photoGrid"></div>

  <div class="how-to" id="howto" style="display:none;">
    <h3>No photos yet</h3>
    <p>Upload photos to the <code>photos/</code> folder in GitHub to show them here.</p>
  </div>
</div>

<script>
window.addEventListener('scroll',function(){
  document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50);
});

// GitHub repository info
var GITHUB_USER = 'rakhibkhabli786-ctrl';
var GITHUB_REPO = 'mywebsite';
var PHOTOS_FOLDER = 'photos';

// Fetch photos from GitHub API
fetch('https://api.github.com/repos/'+GITHUB_USER+'/'+GITHUB_REPO+'/contents/'+PHOTOS_FOLDER)
  .then(function(res){return res.json();})
  .then(function(files){
    document.getElementById('loading').style.display='none';
    var images = files.filter(function(f){
      return f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
    });
    if(images.length===0){
      document.getElementById('howto').style.display='block';
      return;
    }
    var grid = document.getElementById('photoGrid');
    images.forEach(function(img){
      var div = document.createElement('div');
      div.className = 'pgrid-item';
      div.innerHTML = '<img src="'+img.download_url+'" loading="lazy" alt="'+img.name+'">';
      grid.appendChild(div);
    });
  })
  .catch(function(){
    document.getElementById('loading').style.display='none';
    document.getElementById('howto').style.display='block';
  });
</script>
</body>
</html>
